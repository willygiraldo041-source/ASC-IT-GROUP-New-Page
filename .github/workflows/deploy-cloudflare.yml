name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - production
  pull_request:
    branches:
      - main

# Permisos necesarios
permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    
    steps:
      # ========================================
      # 1. Checkout Code
      # ========================================
      - name: Checkout
        uses: actions/checkout@v4

      # ========================================
      # 2. Install pnpm (debe ir antes de setup-node para el cache)
      # ========================================
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      # ========================================
      # 3. Setup Node.js
      # ========================================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'frontend/pnpm-lock.yaml'

      # ========================================
      # 4. Get pnpm store directory
      # ========================================
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      # ========================================
      # 5. Setup pnpm cache
      # ========================================
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # ========================================
      # 6. Install dependencies
      # ========================================
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./frontend

      # ========================================
      # 7. Build for Cloudflare Pages
      # ========================================
      - name: Build with Cloudflare adapter
        run: pnpm build
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
          NEXT_PUBLIC_SANITY_API_VERSION: ${{ secrets.NEXT_PUBLIC_SANITY_API_VERSION }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
          NODE_ENV: production

      # ========================================
      # 8. Deploy to Cloudflare Pages
      # ========================================
      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: asc-it-group
          directory: ./frontend/out
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
          wranglerVersion: '3'

      # ========================================
      # 9. Comment on PR (Preview URL)
      # ========================================
      - name: Comment Preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const branch = context.payload.pull_request.head.ref;
            const previewUrl = `https://${branch}.asc-it-group.pages.dev`;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `## 🚀 Preview Deployment\n\nYour changes have been deployed!\n\n**Preview URL:** ${previewUrl}\n\n*Deployed from branch: \`${branch}\`*`
            });

  # ========================================
  # Lighthouse CI (Performance Check)
  # ========================================
  lighthouse:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://${{ github.head_ref }}.asc-it-group.pages.dev
          uploadArtifacts: true
          temporaryPublicStorage: true

  # ========================================
  # Security Scan (Optional)
  # ========================================
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './frontend'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
